<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEA Standby API Test</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      padding:24px;
      background: linear-gradient(135deg, #6b1fa7, #d12c8b);
      color:#fff;
    }
    .card{
      max-width:900px;
      margin:0 auto;
      background:#fff;
      color:#222;
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
    }
    h1{
      margin-top:0;
    }
    pre{
      background:#f4f4f4;
      padding:16px;
      border-radius:12px;
      overflow:auto;
    }
    button{
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:#6b1fa7;
      color:#fff;
      cursor:pointer;
      font-size:16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ทดสอบเชื่อม Google Apps Script API</h1>
    <p>หน้านี้จะลองเรียกข้อมูลจาก Google Apps Script</p>

    <button onclick="loadAPI()">โหลดข้อมูลจาก API</button>

    <h2>ผลลัพธ์</h2>
    <pre id="result">ยังไม่มีข้อมูล</pre>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxHi06twBYJrMDZaXv_EdRgzWKXVwwXqbkWvDSMz0_lxOJw2DGXY2dVozH-F07yruby/exec";

    async function loadAPI() {
  const result = document.getElementById("result");
  result.textContent = "กำลังโหลด...";

  try {
    const response = await fetch(API_URL + "?action=roster");
    const data = await response.json();

    result.innerHTML = `
  <h3>👨‍🔧 หัวหน้าเวร: ${data.leader}</h3>
  <p>สมาชิก:</p>
  <ul>
    ${data.members.map(n => `<li>${n}</li>`).join("")}
  </ul>
`;
  } catch (error) {
    result.textContent = "เกิดข้อผิดพลาด: " + error.message;
  }
}
  </script>
</body>
</html>
