<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEA Standby API Test</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      padding:24px;
      background: linear-gradient(135deg, #6b1fa7, #d12c8b);
      color:#fff;
    }

    .card{
      max-width:900px;
      margin:0 auto;
      background:#fff;
      color:#222;
      border-radius:16px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
    }

    h1, h2{
      margin-top:0;
    }

    button{
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:#6b1fa7;
      color:#fff;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      opacity:.95;
    }

    input, select{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
      margin-right:8px;
    }

    .result-box{
      background:#f4f4f4;
      padding:16px;
      border-radius:12px;
      margin-top:16px;
      white-space:pre-wrap;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-bottom:16px;
    }

    .calendar-wrap{
      margin:16px 0 20px;
    }

    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-top:10px;
    }

    .calendar-head{
      background:#ece7f6;
      color:#6b1fa7;
      padding:10px;
      border-radius:10px;
      text-align:center;
      font-weight:bold;
      font-size:14px;
    }

    .calendar-day{
      padding:12px 8px;
      background:#fff;
      border:1px solid #ddd;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
      font-weight:bold;
      transition:.15s;
      user-select:none;
    }

    .calendar-day:hover{
      background:#f3e9ff;
      border-color:#6b1fa7;
    }

    .calendar-day.active{
      background:#6b1fa7;
      color:#fff;
      border-color:#6b1fa7;
    }

    .calendar-day.empty{
      background:#f7f7f7;
      color:#bbb;
      cursor:default;
    }

    .info-card{
      background:#fff;
      border-radius:12px;
      padding:16px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      color:#222;
    }

    .shift-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .shift-card{
      color:#fff;
      border-radius:12px;
      padding:16px;
    }

    .shift-card h4{
      margin-top:0;
      margin-bottom:10px;
    }

    .s1{ background:#6b1fa7; }
    .s2{ background:#d12c8b; }
    .s3{ background:#ff9800; }

    .muted{
      color:#666;
      font-size:14px;
    }

    @media (max-width: 700px){
      body{
        padding:14px;
      }

      .card{
        padding:16px;
      }

      .calendar-grid{
        gap:6px;
      }

      .calendar-day, .calendar-head{
        font-size:13px;
        padding:10px 6px;
      }

      input, select, button{
        width:100%;
        margin-right:0;
      }

      .toolbar{
        flex-direction:column;
        align-items:stretch;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ทดสอบเชื่อม Google Apps Script API</h1>
    <p class="muted">โหลดข้อมูลเวรจากชีตรายเดือน</p>

    <div class="toolbar">
      <label for="monthIdx">เดือน:</label>
      <select id="monthIdx" onchange="renderCalendar()">
        <option value="1">ม.ค.</option>
        <option value="2">ก.พ.</option>
        <option value="3">มี.ค.</option>
        <option value="4">เม.ย.</option>
        <option value="5">พ.ค.</option>
        <option value="6">มิ.ย.</option>
        <option value="7">ก.ค.</option>
        <option value="8">ส.ค.</option>
        <option value="9">ก.ย.</option>
        <option value="10">ต.ค.</option>
        <option value="11">พ.ย.</option>
        <option value="12">ธ.ค.</option>
      </select>

      <label for="day">วันที่:</label>
      <input type="number" id="day" value="1" min="1" max="31">

      <button onclick="loadRoster()">โหลดข้อมูลเวร</button>
    </div>

    <div class="calendar-wrap">
      <h2>ปฏิทิน</h2>
      <div id="calendar"></div>
    </div>

    <h2>ผลลัพธ์</h2>
    <div id="result" class="result-box">ยังไม่มีข้อมูล</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxHi06twBYJrMDZaXv_EdRgzWKXVwwXqbkWvDSMz0_lxOJw2DGXY2dVozH-F07yruby/exec";
    const BE_YEAR = 2569;

    const TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const WEEKDAYS = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

    function getDaysInMonth(monthIdx, beYear) {
      const ceYear = beYear - 543;
      return new Date(ceYear, monthIdx, 0).getDate();
    }

    function getFirstDayOfMonth(monthIdx, beYear) {
      const ceYear = beYear - 543;
      return new Date(ceYear, monthIdx - 1, 1).getDay();
    }

    function renderCalendar() {
      const calendar = document.getElementById("calendar");
      const monthIdx = Number(document.getElementById("monthIdx").value);
      const selectedDay = Number(document.getElementById("day").value || 1);

      const daysInMonth = getDaysInMonth(monthIdx, BE_YEAR);
      const firstDay = getFirstDayOfMonth(monthIdx, BE_YEAR);

      let html = `<div class="calendar-grid">`;

      for (const wd of WEEKDAYS) {
        html += `<div class="calendar-head">${wd}</div>`;
      }

      for (let i = 0; i < firstDay; i++) {
        html += `<div class="calendar-day empty"></div>`;
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const activeClass = d === selectedDay ? 'active' : '';
        html += `
          <div class="calendar-day ${activeClass}" onclick="selectDay(${d})">
            ${d}
          </div>
        `;
      }

      html += `</div>`;
      calendar.innerHTML = html;
    }

    function selectDay(day) {
      document.getElementById("day").value = day;
      renderCalendar();
      loadRoster();
    }

    async function loadRoster() {
      const result = document.getElementById("result");
      const monthIdx = document.getElementById("monthIdx").value;
      const day = document.getElementById("day").value;

      result.textContent = "กำลังโหลด...";

      try {
        const url = `${API_URL}?action=roster&beYear=${BE_YEAR}&monthIdx=${monthIdx}&day=${day}`;
        const response = await fetch(url);
        const text = await response.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch (err) {
          result.textContent = "ข้อมูลที่ได้ไม่ใช่ JSON:\n\n" + text;
          return;
        }

        if (!data.ok) {
          result.textContent = "โหลดไม่สำเร็จ:\n" + JSON.stringify(data, null, 2);
          return;
        }

        result.innerHTML = `
          <div style="display:grid; gap:16px;">
            <div class="info-card">
              <h3 style="margin:0 0 12px 0;">📅 วันที่ ${data.day} / ${data.monthIdx} / ${data.beYear}</h3>
              <p>📌 วัน: <strong>${data.weekday || "-"}</strong></p>
              <p>📌 สถานะ: <strong>${data.holiday || "-"}</strong></p>
            </div>

            <div class="shift-grid">
              <div class="shift-card s1">
                <h4>⚡ กะ 1</h4>
                <p>${data.s1 || "-"}</p>
              </div>

              <div class="shift-card s2">
                <h4>⚡ กะ 2</h4>
                <p>${data.s2 || "-"}</p>
              </div>

              <div class="shift-card s3">
                <h4>⚡ กะ 3</h4>
                <p>${data.s3 || "-"}</p>
              </div>
            </div>
          </div>
        `;
      } catch (error) {
        result.textContent = "เกิดข้อผิดพลาด: " + error.message;
      }
    }

    window.onload = function () {
      renderCalendar();
      loadRoster();
    };
  </script>
</body>
</html>
