<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>PEA Standby System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #6b1fa7, #d12c8b);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      margin-top: 50px;
    }

    .card {
      background: white;
      color: #333;
      padding: 20px;
      border-radius: 16px;
      width: 300px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    button {
      background: #6b1fa7;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 16px;
    }

    button:hover {
      background: #4a148c;
    }

    .time {
      font-size: 28px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
⚡ PEA Standby Dashboard
</header>

<div class="container">
  <div class="card">
    <h3>สถานะระบบ</h3>
    <p>ระบบพร้อมใช้งาน</p>

    <div class="time" id="clock">--:--:--</div>

    <button onclick="alert('📢 แจ้งเตือนเวรแล้ว!')">
      แจ้งเตือนเวร
    </button>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString();
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
